<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#0f172a"/>
  <!-- Floating Sphere / Core -->
  <circle cx="256" cy="220" r="100" fill="url(#glowGrad)"/>
  <!-- Anti-gravity wave / rings -->
  <ellipse cx="256" cy="380" rx="160" ry="40" fill="none" stroke="#6366f1" stroke-width="12" stroke-dasharray="24 16" opacity="0.8"/>
  <ellipse cx="256" cy="320" rx="120" ry="30" fill="none" stroke="#818cf8" stroke-width="12" stroke-dasharray="20 12" opacity="0.9"/>
  <!-- Floating particle details -->
  <circle cx="150" cy="180" r="12" fill="#38bdf8" opacity="0.6"/>
  <circle cx="370" cy="150" r="16" fill="#c084fc" opacity="0.7"/>
  <circle cx="200" cy="100" r="8" fill="#818cf8" opacity="0.5"/>
</svg>
